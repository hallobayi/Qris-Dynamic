services:
  qris-dynamic:
    build:
      context: .
      dockerfile: Dockerfile
    image: qris-dynamic:latest
    container_name: qris-dynamic
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_DIST_DIR: /app/public
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
